<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#000008">
<title>KING DIADEM · ACCESS</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Space+Grotesk:wght@300;400;500&family=JetBrains+Mono:wght@300;400&display=swap');

/* ── TOKENS ── */
:root {
  --gold: #e8b84b;
  --gold2: #ffd780;
  --teal: #00d4ff;
  --teal2: #00ffee;
  --void: #000008;
  --glass: rgba(4,2,18,0.72);
  --border: rgba(0,210,255,0.18);
  --border-gold: rgba(232,184,75,0.25);
  --text: rgba(220,235,255,0.92);
  --dim: rgba(160,190,220,0.45);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  width: 100%; height: 100%;
  min-height: 100dvh;
  overflow: hidden;
  font-family: 'Space Grotesk', system-ui, sans-serif;
  background: var(--void);
  color: var(--text);
  -webkit-font-smoothing: antialiased;
}

/* ── HERO BACKGROUND ── */
#bg {
  position: fixed; inset: 0; z-index: 0;
  background-image: url('/static/hero.png');
  background-size: cover;
  background-position: center 30%;
  filter: brightness(0.35) saturate(1.4);
  transform: scale(1.05);
  animation: bgDrift 30s ease-in-out infinite alternate;
}
@keyframes bgDrift {
  0%   { transform: scale(1.05) translate(0,0); }
  50%  { transform: scale(1.08) translate(-8px,4px); }
  100% { transform: scale(1.05) translate(5px,-3px); }
}

/* ── VOID OVERLAY ── */
#void-overlay {
  position: fixed; inset: 0; z-index: 1; pointer-events: none;
  background:
    radial-gradient(ellipse 80% 60% at 50% 100%, rgba(0,0,8,0.95) 0%, transparent 65%),
    radial-gradient(ellipse 100% 50% at 50% 0%,   rgba(0,0,8,0.70) 0%, transparent 55%),
    radial-gradient(ellipse 60% 80% at 0% 50%,    rgba(0,0,8,0.50) 0%, transparent 60%),
    radial-gradient(ellipse 60% 80% at 100% 50%,  rgba(0,0,8,0.50) 0%, transparent 60%);
}

/* ── SCAN LINES ── */
#scan {
  position: fixed; inset: 0; z-index: 2; pointer-events: none;
  background: repeating-linear-gradient(
    0deg,
    transparent,
    transparent 3px,
    rgba(0,210,255,0.015) 3px,
    rgba(0,210,255,0.015) 4px
  );
  animation: scanMove 8s linear infinite;
}
@keyframes scanMove { from { background-position: 0 0; } to { background-position: 0 200px; } }

/* ── PARTICLES ── */
#particles { position: fixed; inset: 0; z-index: 3; pointer-events: none; overflow: hidden; }
.particle {
  position: absolute;
  border-radius: 50%;
  animation: particleDrift linear infinite;
  opacity: 0;
}
@keyframes particleDrift {
  0%   { transform: translateY(100vh) scale(0); opacity: 0; }
  10%  { opacity: 1; }
  90%  { opacity: 0.6; }
  100% { transform: translateY(-20vh) scale(1.5); opacity: 0; }
}

/* ── MAIN LAYOUT ── */
#app {
  position: relative; z-index: 10;
  width: 100%; height: 100dvh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px;
  padding-bottom: calc(24px + env(safe-area-inset-bottom, 0px));
}

/* ── CARD ── */
.card {
  width: 100%;
  max-width: 420px;
  position: relative;
  animation: cardReveal 1.2s cubic-bezier(.16,1,.3,1) both;
}
@keyframes cardReveal {
  from { opacity: 0; transform: translateY(40px) scale(0.96); }
  to   { opacity: 1; transform: translateY(0) scale(1); }
}

/* ── CARD BORDER — animated gradient ── */
.card-border {
  position: absolute; inset: -1px;
  border-radius: 20px;
  background: linear-gradient(
    135deg,
    rgba(0,210,255,0.6),
    rgba(232,184,75,0.4),
    rgba(0,210,255,0.2),
    rgba(232,184,75,0.5)
  );
  background-size: 300% 300%;
  animation: borderFlow 6s ease infinite;
  -webkit-mask: linear-gradient(#fff 0 0) content-box,linear-gradient(#fff 0 0);
  -webkit-mask-composite: destination-out;
  mask-composite: exclude;
  padding: 1px;
  pointer-events: none;
}
@keyframes borderFlow {
  0%,100% { background-position: 0% 50%; }
  50%      { background-position: 100% 50%; }
}

.card-inner {
  position: relative;
  background: var(--glass);
  backdrop-filter: blur(32px) saturate(1.8);
  -webkit-backdrop-filter: blur(32px) saturate(1.8);
  border-radius: 20px;
  border: 1px solid var(--border);
  padding: 44px 36px 36px;
  overflow: hidden;
}

/* ── CARD INNER GLOW ── */
.card-inner::before {
  content: '';
  position: absolute; inset: 0;
  background:
    radial-gradient(ellipse 70% 40% at 50% 0%, rgba(0,210,255,0.08) 0%, transparent 60%),
    radial-gradient(ellipse 50% 30% at 80% 100%, rgba(232,184,75,0.06) 0%, transparent 55%);
  pointer-events: none;
}

/* ── LOGO AREA ── */
.logo-wrap {
  display: flex;
  flex-direction: column;
  align-items: center;
  margin-bottom: 32px;
  animation: cardReveal 1.4s cubic-bezier(.16,1,.3,1) .1s both;
}

.logo-img {
  width: 88px;
  height: 88px;
  object-fit: contain;
  filter:
    drop-shadow(0 0 20px rgba(0,210,255,0.5))
    drop-shadow(0 0 40px rgba(232,184,75,0.3));
  animation: logoPulse 4s ease-in-out infinite;
}
@keyframes logoPulse {
  0%,100% { filter: drop-shadow(0 0 20px rgba(0,210,255,0.5)) drop-shadow(0 0 40px rgba(232,184,75,0.3)); }
  50%      { filter: drop-shadow(0 0 30px rgba(0,210,255,0.8)) drop-shadow(0 0 60px rgba(232,184,75,0.5)); }
}

.logo-name {
  font-family: 'Orbitron', monospace;
  font-size: 22px;
  font-weight: 900;
  letter-spacing: .22em;
  margin-top: 14px;
  background: linear-gradient(135deg, var(--teal2), var(--teal), var(--gold), var(--gold2));
  background-size: 200% 200%;
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  animation: textFlow 5s ease infinite;
}
@keyframes textFlow {
  0%,100% { background-position: 0% 50%; }
  50%      { background-position: 100% 50%; }
}

.logo-sub {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px;
  letter-spacing: .35em;
  color: rgba(0,210,255,0.45);
  margin-top: 5px;
  text-transform: uppercase;
}

/* ── DIVIDER ── */
.divider {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 28px;
}
.divider-line {
  flex: 1;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--border), transparent);
}
.divider-dot {
  width: 4px; height: 4px;
  border-radius: 50%;
  background: var(--teal);
  box-shadow: 0 0 8px var(--teal);
  animation: dotPulse 2s ease-in-out infinite;
}
@keyframes dotPulse {
  0%,100% { opacity: 1; transform: scale(1); }
  50%      { opacity: 0.4; transform: scale(0.6); }
}

/* ── TAGLINE ── */
.tagline {
  text-align: center;
  font-size: 13px;
  line-height: 1.7;
  color: var(--dim);
  margin-bottom: 32px;
  font-weight: 300;
}
.tagline strong {
  color: rgba(220,235,255,0.75);
  font-weight: 400;
}

/* ── GOOGLE BUTTON ── */
.google-btn {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 12px;
  width: 100%;
  padding: 15px 20px;
  border-radius: 12px;
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.12);
  color: var(--text);
  font-family: 'Space Grotesk', sans-serif;
  font-size: 14px;
  font-weight: 500;
  letter-spacing: .02em;
  text-decoration: none;
  cursor: pointer;
  transition: all .22s ease;
  position: relative;
  overflow: hidden;
  margin-bottom: 16px;
}
.google-btn::before {
  content: '';
  position: absolute; inset: 0;
  background: linear-gradient(135deg, rgba(0,210,255,0.08), rgba(232,184,75,0.06));
  opacity: 0;
  transition: opacity .22s ease;
}
.google-btn:hover { border-color: rgba(0,210,255,0.35); transform: translateY(-1px); box-shadow: 0 8px 32px rgba(0,210,255,0.12); }
.google-btn:hover::before { opacity: 1; }
.google-btn:active { transform: translateY(0); }

/* ── EMAIL OPTION ── */
.email-link {
  display: block;
  text-align: center;
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  color: rgba(0,210,255,0.40);
  letter-spacing: .08em;
  text-decoration: none;
  padding: 8px;
  transition: color .2s;
}
.email-link:hover { color: rgba(0,210,255,0.70); }

/* ── FOOTER ── */
.footer {
  margin-top: 28px;
  padding-top: 20px;
  border-top: 1px solid rgba(0,210,255,0.08);
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.footer-text {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px;
  letter-spacing: .10em;
  color: rgba(140,170,210,0.30);
}
.status-dot {
  display: flex;
  align-items: center;
  gap: 5px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px;
  color: rgba(0,255,160,0.50);
  letter-spacing: .08em;
}
.status-dot::before {
  content: '';
  width: 5px; height: 5px;
  border-radius: 50%;
  background: #00ffa0;
  box-shadow: 0 0 6px #00ffa0;
  animation: statusBlink 2.5s ease-in-out infinite;
}
@keyframes statusBlink {
  0%,100% { opacity: 1; }
  50%      { opacity: 0.3; }
}

/* ── CORNER DECORATIONS ── */
.corner {
  position: absolute;
  width: 16px; height: 16px;
  pointer-events: none;
}
.corner::before, .corner::after {
  content: '';
  position: absolute;
  background: var(--teal);
  opacity: 0.6;
}
.corner::before { width: 100%; height: 1px; }
.corner::after  { width: 1px; height: 100%; }
.corner-tl { top: 12px; left: 12px; }
.corner-tr { top: 12px; right: 12px; transform: scaleX(-1); }
.corner-bl { bottom: 12px; left: 12px; transform: scaleY(-1); }
.corner-br { bottom: 12px; right: 12px; transform: scale(-1,-1); }

/* ── MOBILE ── */
@media(max-width:480px) {
  .card-inner { padding: 36px 24px 28px; }
  .logo-img   { width: 72px; height: 72px; }
  .logo-name  { font-size: 18px; }
}

/* ── REDUCED MOTION ── */
@media(prefers-reduced-motion:reduce) {
  *, *::before, *::after { animation-duration:.01ms !important; }
}
</style>
</head>
<body>

<div id="bg"></div>
<div id="void-overlay"></div>
<div id="scan"></div>
<div id="particles"></div>

<div id="app">
  <div class="card">
    <div class="card-border"></div>
    <div class="card-inner">

      <!-- corner decorations -->
      <div class="corner corner-tl"></div>
      <div class="corner corner-tr"></div>
      <div class="corner corner-bl"></div>
      <div class="corner corner-br"></div>

      <!-- logo -->
      <div class="logo-wrap">
        <img src="/static/logo.png" class="logo-img" alt="King Diadem">
        <div class="logo-name">KING DIADEM</div>
        <div class="logo-sub">DriftZero · Governance OS</div>
      </div>

      <!-- divider -->
      <div class="divider">
        <div class="divider-line"></div>
        <div class="divider-dot"></div>
        <div class="divider-line"></div>
      </div>

      <!-- tagline -->
      <p class="tagline">
        ระบบที่ทำให้ <strong>ทางเลือกของมนุษย์</strong> ไม่หายไป<br>
        ยืนยันตัวตนเพื่อเข้าสู่ระนาบการตัดสินใจ
      </p>

      <!-- auth buttons -->
      <a href="/login/google" class="google-btn">
        <svg width="18" height="18" viewBox="0 0 18 18" aria-hidden="true">
          <path fill="#EA4335" d="M9 3.5c1.4 0 2.6.5 3.5 1.4l2.6-2.6C13.5 0 11.4 0 9 0 5.5 0 2.5 2 1.1 5l2.8 2.2C4.6 4.7 6.6 3.5 9 3.5z"/>
          <path fill="#4285F4" d="M17.6 9.2c0-.6-.1-1.2-.2-1.8H9v3.4h4.9c-.2 1.1-.9 2-1.7 2.6l2.8 2.2c1.7-1.5 2.6-3.8 2.6-6.4z"/>
          <path fill="#34A853" d="M4.3 10.9c-.3-.8-.5-1.7-.5-2.6s.2-1.8.5-2.6L1.5 3.5C.5 5.1 0 7 0 9s.5 3.9 1.5 5.5l2.8-2.2z"/>
          <path fill="#FBBC05" d="M9 18c2.4 0 4.4-.8 5.9-2.2l-2.8-2.2c-.8.6-1.9 1-3.1 1-2.4 0-4.4-1.6-5.1-3.8L1.1 13C2.5 16 5.5 18 9 18z"/>
        </svg>
        ยืนยันตัวตนด้วย Google
      </a>

      <a href="/static/login.html#email" class="email-link">
        ◈ เข้าด้วยอีเมล &amp; รหัสผ่าน
      </a>

      <!-- footer -->
      <div class="footer">
        <div class="footer-text">DRIFTZERO © 2026–3026</div>
        <div class="status-dot">ONLINE</div>
      </div>

    </div>
  </div>
</div>

<script>
/* ── Particles ── */
(function(){
  var container = document.getElementById('particles');
  var colors = ['rgba(0,210,255,', 'rgba(232,184,75,', 'rgba(0,255,238,', 'rgba(255,200,80,'];
  for(var i=0;i<28;i++){
    var p = document.createElement('div');
    p.className = 'particle';
    var sz = 1+Math.random()*2.5;
    var col = colors[Math.floor(Math.random()*colors.length)];
    var dur = 8+Math.random()*16;
    var delay = -Math.random()*dur;
    p.style.cssText =
      'width:'+sz+'px;height:'+sz+'px;'+
      'left:'+(Math.random()*100)+'%;'+
      'background:'+col+(0.4+Math.random()*0.5)+');'+
      'box-shadow:0 0 '+(sz*3)+'px '+col+'0.6);'+
      'animation-duration:'+dur+'s;'+
      'animation-delay:'+delay+'s;';
    container.appendChild(p);
  }
})();

/* ── Touch: ป้องกัน double-tap zoom ── */
document.querySelector('.google-btn')?.addEventListener('touchend', function(e){
  e.preventDefault(); window.location.href=this.href;
},{passive:false});
</script>
</body>
</html>
