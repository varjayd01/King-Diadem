<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>Authentication · King Diadem</title>
    <style>
        :root { --bg: #030208; --card: #0a0b10; --accent: #4285f4; --text: #e8eaed; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', system-ui, sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .auth-card { background: var(--card); padding: 40px; border-radius: 12px; border: 1px solid #202124; width: 100%; max-width: 400px; text-align: center; }
        .logo { width: 64px; margin-bottom: 24px; filter: drop-shadow(0 0 10px rgba(66,133,244,0.3)); }
        h1 { font-size: 20px; font-weight: 500; margin-bottom: 8px; }
        p { font-size: 14px; color: #9aa0a6; margin-bottom: 32px; }
        .google-btn { display: flex; align-items: center; justify-content: center; gap: 12px; width: 100%; padding: 12px; border-radius: 6px; background: white; color: #3c4043; border: 1px solid #dadce0; font-weight: 500; text-decoration: none; transition: background 0.2s; }
        .google-btn:hover { background: #f8f9fa; }
        .footer { margin-top: 32px; font-size: 11px; color: #5f6368; }
    </style>
</head>
<body>
    <div class="auth-card">
        <img src="/static/logo.png" class="logo" alt="Logo">
        <h1>เข้าสู่ระบบ KING DIADEM</h1>
        <p>Governance OS — ยืนยันตัวตนเพื่อรักษาความสมบูรณ์ของระบบ</p>
        <a href="/login/google" class="google-btn">
            <svg width="18" height="18" viewBox="0 0 18 18"><path fill="#EA4335" d="M9 3.5c1.4 0 2.6.5 3.5 1.4l2.6-2.6C13.5 0 11.4 0 9 0 5.5 0 2.5 2 1.1 5l2.8 2.2C4.6 4.7 6.6 3.5 9 3.5z"/><path fill="#4285F4" d="M17.6 9.2c0-.6-.1-1.2-.2-1.8H9v3.4h4.9c-.2 1.1-.9 2-1.7 2.6l2.8 2.2c1.7-1.5 2.6-3.8 2.6-6.4z"/><path fill="#34A853" d="M4.3 10.9c-.3-.8-.5-1.7-.5-2.6s.2-1.8.5-2.6L1.5 3.5C.5 5.1 0 7 0 9s.5 3.9 1.5 5.5l2.8-2.2z"/><path fill="#FBBC05" d="M9 18c2.4 0 4.4-.8 5.9-2.2l-2.8-2.2c-.8.6-1.9 1-3.1 1-2.4 0-4.4-1.6-5.1-3.8L1.1 13C2.5 16 5.5 18 9 18z"/></svg>
            Sign in with Google
        </a>
        <div class="footer">DRIFTZERO GOVERNANCE © 2026</div>
    </div>
</body>
</html>
