<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>KING DIADEM</title>

<style>
body{background:#020617;color:#fff;font-family:sans-serif}
#chat{height:70vh;overflow:auto;padding:10px}
.msg{margin:10px;padding:10px;border-radius:10px}
.user{background:#4f46e5;text-align:right}
.bot{background:#111}
</style>
</head>

<body>

<h2>👑 KING DIADEM</h2>

<div id="chat"></div>

<input id="msg" placeholder="พิมพ์..." onkeypress="if(event.key==='Enter')send()">
<button onclick="send()">ส่ง</button>

<script>
async function send(){
    const input = document.getElementById("msg");
    const chat = document.getElementById("chat");

    const text = input.value.trim();
    if(!text) return;

    chat.innerHTML += `<div class="msg user">${text}</div>`;
    input.value="";

    try{
        const res = await fetch("/decision",{
            method:"POST",
            headers:{"Content-Type":"application/json"},
            body:JSON.stringify({
                input:{
                    food:1,
                    money:1,
                    risk:1,
                    text:text
                }
            })
        });

        const data = await res.json();

        chat.innerHTML += `<div class="msg bot">${data.response}</div>`;

    }catch(e){
        chat.innerHTML += `<div class="msg bot">ERROR</div>`;
    }

    chat.scrollTop = chat.scrollHeight;
}
</script>

</body>
</html>
