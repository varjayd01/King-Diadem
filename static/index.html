<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<title>KING DIADEM</title>

<style>

body{

background:#050510;
color:white;
font-family:Arial;
text-align:center;

}

canvas{

border:1px solid #222;

}

input{

width:60%;
padding:12px;
margin-top:20px;

}

button{

padding:12px 25px;
margin-left:10px;

}

#thinking{

margin-top:20px;

}

</style>

</head>

<body>

<h1>KING DIADEM</h1>

<p>
ระบบใดที่ทำให้ทางเลือกของมนุษย์ = 0  
ระบบนั้นล้มเหลว
</p>

<p>
Any system that reduces human choice to zero  
is a failed system
</p>

<input id="question" placeholder="Ask a strategic question">

<button onclick="ask()">ASK</button>

<div id="thinking"></div>

<canvas id="galaxyDecision" width="900" height="500"></canvas>

<script src="/static/galaxy_decision.js"></script>

<script>

function ask(){

let q=document.getElementById("question").value

document.getElementById("thinking").innerText="AI Council thinking..."

fetch("/decision",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
question:q
})

})

.then(r=>r.json())

.then(data=>{

drawGalaxy(
data.problem,
data.options.map(o=>({
strategy:o,
risk:Math.random(),
confidence:Math.random()
}))
)

document.getElementById("thinking").innerText=""

})

}

</script>

</body>

</html>
