<!DOCTYPE html>
<html>
<head>
  <title>KING DIADEM</title>
  <style>
    body {
      background: radial-gradient(circle at center, #0b0f1a, #000);
      color: white;
      font-family: Arial;
      text-align: center;
      padding: 40px;
    }
    h1 {
      font-size: 40px;
      background: linear-gradient(90deg, #00d4ff, #ff9900);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    textarea {
      width: 80%;
      height: 100px;
      border-radius: 10px;
      padding: 10px;
    }
    button {
      margin: 10px;
      padding: 10px 20px;
      border-radius: 10px;
      border: none;
      cursor: pointer;
      background: linear-gradient(90deg, #00d4ff, #ff9900);
      color: black;
      font-weight: bold;
    }
    pre {
      text-align: left;
      margin-top: 20px;
      background: #111;
      padding: 15px;
      border-radius: 10px;
      white-space: pre-wrap;
    }
  </style>
</head>
<body>

<h1>👑 KING DIADEM</h1>

<textarea id="input"></textarea><br>

<button onclick="run('normal')">Run</button>
<button onclick="run('council')">Council Mode</button>

<pre id="output"></pre>

<script src="app.js"></script>

</body>
</html>
