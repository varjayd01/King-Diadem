<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>King Diadem</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    margin: 0;
    font-family: monospace;
    color: #00ffff;
    text-align: center;
    overflow: hidden;
}

/* 🌌 CANVAS */
#stars {
    position: fixed;
    width: 100%;
    height: 100%;
    z-index: -1;
    background: radial-gradient(circle at center, #0b1220, #000);
}

/* 🧠 CARD */
.container {
    margin-top: 80px;
}

.card {
    width: 360px;
    margin: auto;
    padding: 20px;
    border-radius: 20px;
    background: rgba(0,0,0,0.85);
    box-shadow: 0 0 40px #00ffff;
}

/* 👑 TITLE */
h1 {
    font-size: 32px;
    margin: 10px 0;
}

.sub {
    opacity: 0.6;
    margin-bottom: 20px;
}

/* ❌ STATUS */
.status {
    color: red;
    margin-bottom: 15px;
}

/* 📝 INPUT */
input {
    width: 80%;
    padding: 10px;
    background: black;
    border: 2px solid #00ffff;
    color: #00ffff;
}

/* 🚀 BUTTON */
button {
    margin-top: 10px;
    padding: 10px 20px;
    background: gold;
    border: none;
    cursor: pointer;
}

/* 📦 OUTPUT */
pre {
    margin-top: 15px;
    text-align: left;
    background: black;
    padding: 10px;
    border: 1px solid #00ffff;
    height: 150px;
    overflow: auto;
}
</style>
</head>

<body>

<!-- 🌌 CANVAS -->
<canvas id="stars"></canvas>

<div class="container">
    <div class="card">

        <h1>King Diadem</h1>
        <div class="sub">AI Decision Civilization Platform</div>

        <div class="status">❌ เครดิตหมด (AI ถูกจำกัด)</div>

        <input id="input" placeholder="พิมพ์สถานการณ์ของคุณ...">

        <br>
        <button onclick="run()">→</button>

        <pre id="output">
{
  "observer": "KING DIADEM",
  "status": "AI DISABLED",
  "note": "ระบบยังทำงาน แต่ AI ปิดชั่วคราว"
}
        </pre>

    </div>
</div>

<script>
/* 🌌 STAR ENGINE */
const canvas = document.getElementById("stars");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let stars = [];

for (let i = 0; i < 200; i++) {
    stars.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        size: Math.random() * 2,
        speed: Math.random() * 0.3
    });
}

function drawStars() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    ctx.fillStyle = "#00ffff";

    stars.forEach(star => {
        ctx.beginPath();
        ctx.arc(star.x, star.y, star.size, 0, Math.PI * 2);
        ctx.fill();

        star.y += star.speed;

        if (star.y > canvas.height) {
            star.y = 0;
        }
    });

    requestAnimationFrame(drawStars);
}

drawStars();

/* 🧠 SYSTEM MOCK */
function run() {
    const input = document.getElementById("input").value;

    document.getElementById("output").textContent =
`{
  "input": "${input}",
  "logic": "เหตุ → ความคิด → การตัดสินใจ → ผลลัพธ์",
  "status": "AI DISABLED",
  "message": "ระบบยังไม่เชื่อม AI"
}`;
}
</script>

</body>
</html>
