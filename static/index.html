<!DOCTYPE html>
<html>
<head>
    <title>KING AI</title>
    <style>
        body {
            background: black;
            color: #00ffcc;
            font-family: monospace;
            padding: 20px;
        }

        #chat {
            height: 400px;
            overflow-y: auto;
            border: 1px solid #00ffcc;
            padding: 10px;
            margin-bottom: 10px;
        }

        .msg {
            margin: 5px 0;
        }

        input {
            width: 70%;
            padding: 10px;
            background: black;
            color: #00ffcc;
            border: 1px solid #00ffcc;
        }

        button {
            padding: 10px;
            background: #00ffcc;
            border: none;
            cursor: pointer;
        }
    </style>
</head>

<body>

<h2>KING AI CHAT</h2>

<div id="chat"></div>

<input id="input" placeholder="พิมพ์..." />
<button onclick="send()">Send</button>
<button onclick="newChat()">New Chat</button>

<script>
let history = []

function render() {
    const chat = document.getElementById("chat")
    chat.innerHTML = ""

    history.forEach(m => {
        chat.innerHTML += `<div class="msg"><b>${m.role}:</b> ${m.content}</div>`
    })

    chat.scrollTop = chat.scrollHeight
}

async function send() {
    const input = document.getElementById("input")
    const text = input.value

    if (!text) return

    history.push({role: "user", content: text})
    render()

    input.value = ""

    const res = await fetch("/chat", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({message: text})
    })

    const data = await res.json()

    history.push({role: "ai", content: data.reply})
    render()
}

function newChat() {
    history = []
    render()
}
</script>

</body>
</html>
