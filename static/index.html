<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KING DIADEM - วงแห่งทางเลือก</title>
    <style>
        body { background: #04060b; color: #d0e8ff; font-family: 'Courier New', monospace; padding: 20px; line-height: 1.7; }
        .wrapper { max-width: 900px; margin: auto; }
        .panel { background: rgba(10,20,40,0.8); border: 1px solid #1e3a5f; padding: 25px; border-radius: 15px; margin-bottom: 25px; }
        textarea { width: 100%; background: #000; color: #63f6ff; border: 1px solid #1e3a5f; padding: 15px; border-radius: 10px; resize: none; font-size: 16px; }
        button { background: linear-gradient(135deg, #63f6ff 0%, #4af3a4 100%); color: #000; border: none; padding: 15px; border-radius: 10px; cursor: pointer; font-weight: bold; width: 100%; font-size: 18px; margin-top: 10px; }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        .truth-content { border-left: 2px solid #63f6ff; padding-left: 20px; margin: 20px 0; font-size: 15px; color: #b0cce0; }
        .action-summary { background: rgba(74, 243, 164, 0.15); border: 1px solid #4af3a4; color: #4af3a4; padding: 15px; border-radius: 10px; font-weight: bold; }
        h2 { text-align: center; letter-spacing: 5px; color: #63f6ff; }
    </style>
</head>
<body>
    <div class="wrapper">
        <h2>KING DIADEM</h2>
        <div class="panel">
            <textarea id="input" rows="5" placeholder="ระบุสิ่งที่กำลังเผชิญ เพื่อมองผ่านวงแห่งทางเลือก..."></textarea>
            <button onclick="askKing()" id="runBtn">เปิดมิติมุมมอง</button>
        </div>
        <div id="result"></div>
    </div>

    <script>
        async function askKing() {
            const btn = document.getElementById("runBtn");
            const text = document.getElementById("input").value;
            if(!text) return;

            btn.innerText = "กำลังเชื่อมต่อวงแห่งทางเลือก...";
            btn.disabled = true;

            try {
                const res = await fetch("/ENGINE", {
                    method: "POST",
                    headers: {"Content-Type": "application/json"},
                    body: JSON.stringify({input_text: text})
                });
                const data = await res.json();
                render(data);
            } catch (e) {
                alert("การเชื่อมต่อขัดข้อง");
            } finally {
                btn.innerText = "เปิดมิติมุมมอง";
                btn.disabled = false;
            }
        }

        function render(data) {
            const container = document.getElementById("result");
            const views = [
                { title: "มุมมองเชิงโครงสร้าง", text: data.view_structural },
                { title: "มุมมองความเป็นไปได้", text: data.view_possibility },
                { title: "มุมมองความมั่นคง", text: data.view_stability }
            ];

            let html = "";
            views.forEach(v => {
                const parts = v.text.split("[สรุปความจริงเพื่อการใช้งาน]:");
                html += `
                <div class="panel">
                    <small style="color:#63f6ff">${v.title}</small>
                    <div class="truth-content">${parts[0].trim()}</div>
                    ${parts[1] ? `<div class="action-summary">🚩 สรุปการนำไปใช้: ${parts[1].trim()}</div>` : ""}
                </div>`;
            });
            container.innerHTML = html;
        }
    </script>
</body>
</html>
