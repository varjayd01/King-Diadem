<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <title>{{ title or "KING DIADEM" }}</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>
  <h1>🌌 {{ system_name }}</h1>

  <p>Status: {{ status }}</p>

  <h3>Decision Output:</h3>
  <pre>{{ decision_output }}</pre>

  <h3>Paths:</h3>
  <ul>
    {% for path in paths %}
      <li>{{ path }}</li>
    {% endfor %}
  </ul>

</body>
</html>
